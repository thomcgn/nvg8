spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.baseline-description=baseline

spring.jpa.hibernate.ddl-auto=validate

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
security.jwt.secret=dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev-dev

# --- LOGGING (SQL + bind params + DAO exceptions)
logging.level.org.springframework.jdbc=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.dao=DEBUG
# Zeigt Mapping-Details
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation=DEBUG

# Zeigt DispatcherServlet-Routing
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG

# Falls Spring Security im Spiel ist
logging.level.org.springframework.security=DEBUG